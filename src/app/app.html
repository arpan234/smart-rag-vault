<div class="min-h-screen flex flex-col bg-zinc-50 dark:bg-zinc-950 transition-colors duration-300">
  
  <!-- Top Navigation Bar (Premium Glassmorphism) -->
  <nav class="glass-panel sticky top-0 z-40 border-b border-zinc-200/50 dark:border-zinc-800/50 shrink-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 md:h-[72px]">
        
        <!-- Left Side: Brand Logo -->
        <div class="brand-container">
          <div class="w-9 h-9 rounded-xl brand-icon-box flex items-center justify-center text-white shrink-0">
            <lucide-icon [name]="DatabaseIcon" class="w-5 h-5"></lucide-icon>
          </div>
          <div>
            <span class="text-base font-extrabold tracking-tight bg-gradient-to-r from-violet-600 to-indigo-500 bg-clip-text text-transparent dark:from-violet-400 dark:to-indigo-300 leading-none block">
              Smart RAG Vault
            </span>
            <span class="text-[10px] text-zinc-400 dark:text-zinc-500 font-bold block mt-1 uppercase tracking-widest">Educational Vault</span>
          </div>
        </div>

        <!-- Center: Navigation Tabs in a segmented control track -->
        <div class="hidden md:flex items-center">
          <div class="nav-track">
            <a 
              routerLink="chat" 
              routerLinkActive="active-tab" 
              [routerLinkActiveOptions]="{exact: true}"
              class="nav-tab-link cursor-pointer">
              <lucide-icon [name]="ChatIcon" class="w-4.5 h-4.5"></lucide-icon>
              <span>AI Agent Chat</span>
            </a>
            
            <a 
              routerLink="vault" 
              routerLinkActive="active-tab" 
              class="nav-tab-link cursor-pointer">
              <lucide-icon [name]="DatabaseIcon" class="w-4.5 h-4.5"></lucide-icon>
              <span>Knowledge Vault</span>
            </a>
            
            <a 
              routerLink="playground" 
              routerLinkActive="active-tab" 
              class="nav-tab-link cursor-pointer">
              <lucide-icon [name]="CpuIcon" class="w-4.5 h-4.5"></lucide-icon>
              <span>RAG Playground</span>
            </a>
   
            <a 
              routerLink="academy" 
              routerLinkActive="active-tab" 
              class="nav-tab-link cursor-pointer">
              <lucide-icon [name]="AcademyIcon" class="w-4.5 h-4.5"></lucide-icon>
              <span>RAG Academy</span>
            </a>
          </div>
        </div>

        <!-- Right Side: Config Controls -->
        <div class="flex items-center gap-2 md:gap-3">
          
          <!-- Guide / How it Works trigger -->
          <button 
            (click)="settingsService.openInfo()"
            class="ctrl-btn cursor-pointer"
            aria-label="How it Works">
            <lucide-icon [name]="HelpIcon" class="w-4.5 h-4.5 text-violet-500 dark:text-violet-400"></lucide-icon>
            <span class="hidden sm:inline">How it Works</span>
          </button>

          <!-- Theme Switcher -->
          <button 
            (click)="settingsService.toggleTheme()"
            class="ctrl-btn cursor-pointer !p-2"
            aria-label="Toggle theme">
            <lucide-icon [name]="settingsService.theme() === 'dark' ? SunIcon : MoonIcon" class="w-4.5 h-4.5"></lucide-icon>
          </button>

          <!-- Settings trigger -->
          <button 
            (click)="settingsService.openSettings()"
            class="ctrl-btn group cursor-pointer"
            aria-label="Open Settings">
            <lucide-icon [name]="SettingsIcon" class="w-4.5 h-4.5 group-hover:rotate-45 transition-transform duration-300"></lucide-icon>
            <span class="hidden sm:inline">Settings</span>
          </button>

        </div>

      </div>
    </div>
  </nav>

  <!-- Mobile Bottom Tab Navigation -->
  <div class="md:hidden fixed bottom-0 left-0 right-0 glass-panel border-t border-zinc-200/50 dark:border-zinc-800/50 z-40 shrink-0">
    <div class="grid grid-cols-4 h-16">
      <a 
        routerLink="chat" 
        routerLinkActive="text-violet-600 dark:text-violet-400"
        class="flex flex-col items-center justify-center gap-1 text-xs font-semibold text-zinc-400 hover:text-zinc-900 transition-all cursor-pointer">
        <lucide-icon [name]="ChatIcon" class="w-5 h-5"></lucide-icon>
        Chat
      </a>
      
      <a 
        routerLink="vault" 
        routerLinkActive="text-violet-600 dark:text-violet-400"
        class="flex flex-col items-center justify-center gap-1 text-xs font-semibold text-zinc-400 hover:text-zinc-900 transition-all cursor-pointer">
        <lucide-icon [name]="DatabaseIcon" class="w-5 h-5"></lucide-icon>
        Vault
      </a>
      
      <a 
        routerLink="playground" 
        routerLinkActive="text-violet-600 dark:text-violet-400"
        class="flex flex-col items-center justify-center gap-1 text-xs font-semibold text-zinc-400 hover:text-zinc-900 transition-all cursor-pointer">
        <lucide-icon [name]="CpuIcon" class="w-5 h-5"></lucide-icon>
        Playground
      </a>
 
      <a 
        routerLink="academy" 
        routerLinkActive="text-violet-600 dark:text-violet-400"
        class="flex flex-col items-center justify-center gap-1 text-xs font-semibold text-zinc-400 hover:text-zinc-900 transition-all cursor-pointer">
        <lucide-icon [name]="AcademyIcon" class="w-5 h-5"></lucide-icon>
        Academy
      </a>
    </div>
  </div>

  <!-- Main Viewport Router Frame (Scrollable) -->
  <main class="flex-1 overflow-x-hidden md:pb-0 pb-16">
    <router-outlet></router-outlet>
  </main>

  <!-- Global Settings Modal drawer -->
  <app-settings-modal></app-settings-modal>

  <!-- Global Educational Info Drawer -->
  <app-info-drawer></app-info-drawer>

</div>
